<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>
<script src="node.js"></script>
<script src="download.js"></script>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

#qrcode {
  margin-top: 20px;
}

.color-picker {
  display: flex;
  gap: 10px;
}

.color-picker input {
  width: 50%;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>
<body>

<div class="container">

<h1>🔥 QR Generator Pro</h1>

<input type="text" id="text" placeholder="Masukkan link / text...">

<select id="size">
  <option value="150">Small</option>
  <option value="200" selected>Medium</option>
  <option value="300">Large</option>
</select>

<div class="color-picker">
  <input type="color" id="fg" value="#000000">
  <input type="color" id="bg" value="#ffffff">
</div>

<button onclick="generateQR()">Generate QR</button>
<button onclick="downloadQR()">Download QR</button>

<div id="qrcode"></div>

<footer>Made by Lu 😎</footer>

</div>

<script>
let qr;

function generateQR() {
  let text = document.getElementById("text").value;
  let size = document.getElementById("size").value;
  let fg = document.getElementById("fg").value;
  let bg = document.getElementById("bg").value;

  if (text === "") {
    alert("Isi dulu bro!");
    return;
  }

  document.getElementById("qrcode").innerHTML = "";

  qr = new QRCodeStyling({
    width: parseInt(size),
    height: parseInt(size),
    data: text,
    dotsOptions: {
      color: fg,
      type: "rounded"
    },
    backgroundOptions: {
      color: bg
    },
    imageOptions: {
      crossOrigin: "anonymous",
      margin: 5
    }
  });

  qr.append(document.getElementById("qrcode"));
}
</script>

</body>
</html>
