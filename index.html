<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator Pro</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 30px;
}
input, select, button {
  margin: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}
#qrcode {
  margin-top: 20px;
}
#qrcode canvas {
  padding: 10px;
  background: white;
  border-radius: 20px;
  border: 5px solid #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
}
</style>
</head>

<body>

<h2>QR Generator 🔥</h2>

<input type="text" id="text" placeholder="Masukkan link"><br>

<select id="size">
  <option value="200">200</option>
  <option value="300">300</option>
</select><br>

<input type="file" id="logoInput"><br>

<button onclick="generateQR()">Generate</button>
<button onclick="downloadQR()">Download</button>

<div id="qrcode"></div>

<script>
let qr;

function generateQR() {
  const text = document.getElementById("text").value;
  const size = document.getElementById("size").value;
  const file = document.getElementById("logoInput").files[0];

  if (!text) {
    alert("Isi dulu bro!");
    return;
  }

  document.getElementById("qrcode").innerHTML = "";

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      createQR(e.target.result);
    };
    reader.readAsDataURL(file);
  } else {
    createQR(null);
  }

  function createQR(logo) {
    qr = new QRCodeStyling({
      width: parseInt(size),
      height: parseInt(size),
      data: text,
      image: logo || undefined,
      dotsOptions: {
        color: "#000",
        type: "rounded"
      },
      backgroundOptions: {
        color: "#fff"
      },
      imageOptions: {
        margin: 5,
        imageSize: 0.4
      }
    });

    qr.append(document.getElementById("qrcode"));
  }
}

function downloadQR() {
  if (!qr) {
    alert("Generate dulu bro!");
    return;
  }
  qr.download({ name: "qr", extension: "png" });
}
</script>

</body>
</html>
